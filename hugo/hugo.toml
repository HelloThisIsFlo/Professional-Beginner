baseURL = "https://professionalbeginner.com"
languageCode = "en-us"
title = "Professional Beginner"
theme = "professional-beginner"
enableRobotsTXT = true
[pagination]
  pagerSize = 6
summaryLength = 40

# No trailing slashes (matches Gatsby config)
[permalinks]
  posts = "/:filename"

[params]
  description = "My name is Flo Kempenich, and I am the Professional Beginner. I apply the Beginner's Mind to the world of Software and share on this blog what I learn throughout my Journey"
  author = "Flo Kempenich"
  keywords = ["software", "crafting", "TDD", "testing", "code", "developer", "learning", "Flo Kempenich"]
  # Cloudflare Web Analytics beacon token (set in Cloudflare dashboard)
  # cloudflareAnalytics = "your-token-here"
  # PostHog analytics (public project API key — safe to commit)
  postHogApiKey = "phc_CnletHt3c7lUcGFDCBUdcgNznkZHWBScN9evAmB7UgT"
  postHogApiHost = "https://eu.i.posthog.com"

[markup]
  [markup.highlight]
    style = "solarized-light"
    noClasses = false
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]

[services]
  [services.disqus]
    shortname = "professionalbeginner"

[taxonomies]
  tag = "tags"
