version: "3.7"

services:
  frontend:
    build: ./hugo
    restart: always
    ports:
      - published: 2000
        target: 80

  rss:
    build: ./RSS_feed
    restart: always
    ports:
      - published: 2001
        target: 3000
    command: ["node", "index.js"]
    environment:
      - FRONTEND_URL=http://frontend:80
